services:
  - type: web
    name: ai-money-mentor-backend
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app  # update after Vercel deploy
      - key: PYTHON_VERSION
        value: 3.11.0
